name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev deps
        run: python -m pip install -e .[dev]

      # Run the maintained "default lane": pytest with markers, excluding the
      # live-environment integration tests (no Ollama server / no browser in CI).
      # unittest discover (the old runner) ignored these markers and so ran the
      # needs_ollama / needs_web tests, which errored in CI (#176).
      - name: Run test suite (default lane)
        run: >-
          python -m pytest -q
          -m "not needs_ollama and not needs_web"
